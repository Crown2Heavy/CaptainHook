version: '3.8'

services:
  # Build for Windows (.exe) using Wine + Windows Python
  windows-builder:
    build: .
    volumes:
      - .:/src
    command: |
      bash -c "wine python.exe -m PyInstaller --onefile --noconsole --name CaptainHook --paths=/src/build_staging src/client/main.py"

  # Build for Linux (.bin) - Native
  linux-builder:
    image: python:3.12-slim
    volumes:
      - .:/src
    working_dir: /src
    command: |
      bash -c "pip install pyinstaller discord.py aiohttp mss psutil pyautogui pynput ping3 rich cryptography && pyinstaller --onefile --noconsole --name CaptainHook --paths=/src/build_staging src/client/main.py"
