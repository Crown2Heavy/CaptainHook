version: '3.8'

services:
  # Build for Windows (.exe) using Wine + Windows Python
  windows-builder:
    build: .
    volumes:
      - .:/src
    command: |
      bash -c "winpy -m pip install . && winpy -m PyInstaller --onefile --noconsole --name CaptainHook build_staging/src/client/main.py"

  # Build for Linux (.bin) - Native
  linux-builder:
    image: python:3.12
    volumes:
      - .:/src
    working_dir: /src
    command: |
      bash -c "python -m pip install --upgrade pip && pip install . && pyinstaller --onefile --noconsole --name CaptainHook build_staging/src/client/main.py"
